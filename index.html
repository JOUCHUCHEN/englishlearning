<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Animals - 記憶翻牌遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 卡片 3D 翻轉效果的 CSS 設定 */
        .perspective {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        
        /* 避免在觸控螢幕上選取文字 */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-sky-100 h-[100dvh] flex flex-col items-center py-2 sm:py-4 font-sans overflow-hidden">

    <!-- 音樂控制按鈕 -->
    <div class="fixed top-2 right-2 sm:top-4 sm:right-4 z-50">
        <button id="music-toggle" class="bg-white w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full shadow border-2 border-sky-200 hover:bg-sky-50 text-xl transition-colors no-select">
            🔇
        </button>
    </div>

    <!-- 遊戲標題與計分板 -->
    <div class="text-center mb-2 flex-shrink-0">
        <h1 class="text-2xl sm:text-3xl font-bold text-amber-600 mb-1 drop-shadow-md border-b-4 border-amber-400 pb-1 inline-block">🐾 Amazing Animals 🐾</h1>
        <div class="mt-2 flex justify-center gap-4 text-sm sm:text-base font-bold text-sky-800">
            <div class="bg-white px-3 py-1 sm:px-4 sm:py-2 rounded-full shadow-sm border-2 border-sky-200">
                步數: <span id="moves" class="text-amber-500">0</span>
            </div>
            <div class="bg-white px-3 py-1 sm:px-4 sm:py-2 rounded-full shadow-sm border-2 border-sky-200">
                配對成功: <span id="matches" class="text-green-500">0</span> / 10
            </div>
        </div>
    </div>

    <!-- 遊戲網格 -->
    <div id="game-board" class="grid grid-cols-4 grid-rows-5 sm:grid-cols-5 sm:grid-rows-4 gap-2 sm:gap-3 max-w-4xl w-full px-4 flex-1 min-h-0 perspective pb-2">
        <!-- 卡片將由 JavaScript 動態生成 -->
    </div>

    <!-- 控制按鈕 -->
    <div class="mt-2 mb-2 sm:mb-4 flex-shrink-0">
        <button onclick="initGame()" class="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-6 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 text-base sm:text-lg border-b-4 border-amber-600">
            🔄 重新開始
        </button>
    </div>

    <!-- 勝利視窗 (預設隱藏) -->
    <div id="win-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm text-center shadow-2xl transform scale-100 transition-transform">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold text-green-600 mb-2">太棒了！</h2>
            <p class="text-lg text-gray-700 mb-6">你找出了所有的動物！<br>總共花了 <span id="final-moves" class="font-bold text-amber-500"></span> 步。</p>
            <button onclick="initGame()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-md transform transition hover:scale-105 active:scale-95 text-lg">
                再來玩一次
            </button>
        </div>
    </div>

    <!-- AI 知識小學堂 (Toast 通知區) -->
    <div id="toast-container" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 w-[90%] max-w-md z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const apiKey = ""; // 系統會自動提供金鑰

        // ==========================================
        // 🎵 音效與背景音樂設定
        // ==========================================
        let audioCtx = null;
        let isMuted = true; // 預設靜音
        const musicToggle = document.getElementById('music-toggle');

        // 設定您指定的背景音樂與外部音效 (轉換為 Raw URL 以便讀取音檔)
        const bgMusic = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/englishlearning/main/bluelike_u-5-strawberry-mousse-cute-bgm-274668.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4;

        const matchSound = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/englishlearning/main/correct.mp3');
        const errorSound = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/englishlearning/main/error.mp3');
        const winSound = new Audio('https://raw.githubusercontent.com/JOUCHUCHEN/englishlearning/main/freesound_crunchpixstudio-purchase-success-384963.mp3');

        // 初始化音效引擎 (僅用於翻牌的基礎特效音)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 彈奏單音 (基礎翻牌特效音使用)
        function playTone(freq, type, duration, vol) {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // 設定音量漸弱，讓聲音圓潤不刺耳
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 播放遊戲音效
        function playSfx(type) {
            if (isMuted) return;
            if (type === 'flip') {
                playTone(600, 'sine', 0.1, 0.05); // 翻牌：維持短促高音
            } else if (type === 'match') {
                matchSound.currentTime = 0; // 確保音效可以快速重複播放
                matchSound.play().catch(err => console.log("音效播放提示:", err.message));
            } else if (type === 'error') {
                errorSound.currentTime = 0;
                errorSound.play().catch(err => console.log("音效播放提示:", err.message));
            } else if (type === 'win') {
                winSound.currentTime = 0;
                winSound.play().catch(err => console.log("音效播放提示:", err.message));
            }
        }

        // 音樂開關控制
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // 避免觸發 body 的點擊事件
            initAudio(); // 確保特效音引擎啟動
            isMuted = !isMuted;
            if (isMuted) {
                bgMusic.pause();
                musicToggle.textContent = '🔇';
            } else {
                const playPromise = bgMusic.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => console.log("音樂播放提示:", err.message));
                }
                musicToggle.textContent = '🎵';
            }
        });

        // 監聽第一次點擊以啟動音樂 (因瀏覽器限制自動播放)
        document.body.addEventListener('click', () => {
            initAudio(); // 確保特效音引擎啟動
            if (isMuted) {
                const playPromise = bgMusic.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isMuted = false;
                        musicToggle.textContent = '🎵';
                    }).catch((err) => {
                        console.log("自動播放被阻擋或無音訊來源:", err.message);
                        musicToggle.textContent = '🔇';
                    });
                }
            }
        }, { once: true });


        // 目標動物資料 (使用 Emoji 代表圖片，方便跨平台顯示且可愛)
        const animalData = [
            { id: 'snake', name: 'Snake', icon: '🐍' },
            { id: 'crow', name: 'Crow', icon: '🐦‍⬛' },
            { id: 'horse', name: 'Horse', icon: '🐴' },
            { id: 'dog', name: 'Dog', icon: '🐶' },
            { id: 'whale', name: 'Whale', icon: '🐳' },
            { id: 'elephant', name: 'Elephant', icon: '🐘' },
            { id: 'lion', name: 'Lion', icon: '🦁' },
            { id: 'human', name: 'Human', icon: '👦' }, 
            { id: 'seal', name: 'Seal', icon: '🦭' },
            { id: 'eagle', name: 'Eagle', icon: '🦅' }
        ];

        let cards = [];
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;
        let matches = 0;

        const gameBoard = document.getElementById('game-board');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');
        const winModal = document.getElementById('win-modal');
        const finalMovesEl = document.getElementById('final-moves');
        const toastContainer = document.getElementById('toast-container');

        // 初始化遊戲
        function initGame() {
            gameBoard.innerHTML = '';
            winModal.classList.add('hidden');
            toastContainer.innerHTML = '';
            moves = 0;
            matches = 0;
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            updateStats();

            // 產生「圖像」與「文字」配對卡片
            cards = [];
            animalData.forEach(animal => {
                cards.push({ id: animal.id, name: animal.name, icon: animal.icon, type: 'image' });
                cards.push({ id: animal.id, name: animal.name, icon: animal.icon, type: 'text' });
            });
            
            // 洗牌演算法 (Fisher-Yates Shuffle)
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            // 建立卡片 DOM 元素
            cards.forEach((animal, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('relative', 'w-full', 'h-full', 'cursor-pointer', 'no-select');
                cardElement.dataset.id = animal.id; // 改用 id 進行配對
                cardElement.dataset.name = animal.name;

                // 內部容器 (控制 3D 翻轉)
                const innerElement = document.createElement('div');
                innerElement.classList.add('w-full', 'h-full', 'absolute', 'transform-style-3d', 'rounded-xl', 'shadow-md');
                
                // 卡片背面 (初始顯示面 - 草地/葉子圖案)
                const cardBack = document.createElement('div');
                cardBack.classList.add('w-full', 'h-full', 'absolute', 'backface-hidden', 'bg-gradient-to-br', 'from-emerald-400', 'to-green-600', 'rounded-xl', 'flex', 'items-center', 'justify-center', 'border-4', 'border-white', 'hover:opacity-90', 'transition-opacity');
                cardBack.innerHTML = '<span class="text-3xl sm:text-4xl text-white opacity-50">🍃</span>';

                // 卡片正面 (翻開後顯示面 - 根據 type 顯示圖像或文字)
                const cardFront = document.createElement('div');
                cardFront.classList.add('w-full', 'h-full', 'absolute', 'backface-hidden', 'rotate-y-180', 'bg-white', 'rounded-xl', 'flex', 'flex-col', 'items-center', 'justify-center', 'border-4', 'border-amber-300', 'p-1', 'sm:p-2', 'text-center');
                
                if (animal.type === 'image') {
                    cardFront.innerHTML = `<span class="text-4xl sm:text-5xl drop-shadow-sm">${animal.icon}</span>`;
                } else {
                    cardFront.innerHTML = `<span class="text-base sm:text-xl font-bold text-slate-800 break-words w-full px-1">${animal.name}</span>`;
                }

                innerElement.appendChild(cardBack);
                innerElement.appendChild(cardFront);
                cardElement.appendChild(innerElement);

                // 點擊事件
                cardElement.addEventListener('click', () => flipCard(cardElement, innerElement));

                gameBoard.appendChild(cardElement);
            });
        }

        // 翻牌邏輯
        function flipCard(card, inner) {
            if (lockBoard) return;
            if (card === firstCard) return; // 避免點擊同一張卡片
            if (card.classList.contains('matched')) return; // 避免點擊已配對的卡片

            // 播放翻牌音效
            playSfx('flip');

            // 執行翻轉動畫
            inner.classList.add('rotate-y-180');

            if (!firstCard) {
                // 第一次點擊
                firstCard = card;
                return;
            }

            // 第二次點擊
            secondCard = card;
            moves++;
            updateStats();
            checkForMatch();
        }

        // 檢查是否配對成功
        function checkForMatch() {
            // 改用 id 檢查是否配對 (圖案卡和文字卡有相同的 id)
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;

            if (isMatch) {
                let animalName = firstCard.dataset.name;
                disableCards(animalName);
            } else {
                unflipCards();
            }
        }

        // 配對成功：停用點擊並保持翻開
        function disableCards(animalName) {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            // 將卡片暫存到區域變數中，避免在計時器內讀取到被重設的 null 值
            const matchCard1 = firstCard;
            const matchCard2 = secondCard;
            
            // 播放配對成功音效
            playSfx('match');

            // 加上配對成功的視覺提示 (改變正面卡片的邊框與背景色)
            setTimeout(() => {
                // 取得卡片的正面元素 (innerElement 的第二個子元素)
                const front1 = matchCard1.firstElementChild.children[1];
                const front2 = matchCard2.firstElementChild.children[1];
                
                // 將邊框改為綠色，並加上淺綠色背景
                front1.classList.remove('border-amber-300', 'bg-white');
                front1.classList.add('border-green-500', 'bg-green-50');
                
                front2.classList.remove('border-amber-300', 'bg-white');
                front2.classList.add('border-green-500', 'bg-green-50');

                matches++;
                updateStats();
                
                // 觸發 AI 小知識功能
                fetchAnimalFunFact(animalName);
                
                if (matches === animalData.length) {
                    setTimeout(showWinModal, 500);
                }
            }, 300);

            resetBoard();
        }

        // 配對失敗：將卡片翻回去
        function unflipCards() {
            lockBoard = true; // 鎖定面板，防止點擊其他卡片
            
            // 播放配對失敗音效
            playSfx('error');

            setTimeout(() => {
                firstCard.firstElementChild.classList.remove('rotate-y-180');
                secondCard.firstElementChild.classList.remove('rotate-y-180');
                resetBoard();
            }, 1000); // 等待1秒後翻回
        }

        // 重置點擊狀態
        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        // 更新計分板
        function updateStats() {
            movesEl.textContent = moves;
            matchesEl.textContent = matches;
        }

        // 顯示勝利視窗
        function showWinModal() {
            playSfx('win'); // 播放勝利音效
            finalMovesEl.textContent = moves;
            winModal.classList.remove('hidden');
        }

        // 顯示 Toast 訊息
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-100 border-green-400 text-green-800' : 
                            type === 'error' ? 'bg-red-100 border-red-400 text-red-800' : 
                            'bg-blue-100 border-blue-400 text-blue-800';
                            
            toast.className = `p-4 rounded-xl shadow-lg border-2 ${bgColor} transform transition-all duration-300 translate-y-10 opacity-0 pointer-events-auto flex items-center gap-3`;
            toast.innerHTML = `
                <span class="text-2xl">${type === 'success' ? '✨' : type === 'error' ? '❌' : '🤖'}</span>
                <p class="font-bold text-sm sm:text-base">${message}</p>
            `;
            
            toastContainer.prepend(toast);
            
            // 動畫進入
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // 4秒後消失 (原本是 5 秒，縮減 1 秒)
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // 使用 Gemini API 獲取動物冷知識
        async function fetchAnimalFunFact(animalName) {
            if (!apiKey) {
                showToast(`太棒了！你找到了 ${animalName}！`, 'success');
                return;
            }

            showToast(`正在請 AI 老師尋找關於 ${animalName} 的小知識...`, 'info');

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `請用繁體中文給7歲小朋友講一個關於「${animalName}」的有趣冷知識。長度限制在一句話以內，語氣活潑可愛，不用開頭問候。`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "你是一個擅長跟小朋友互動的動物專家。" }] }
            };

            const maxRetries = 5;
            let retries = 0;
            let delay = 1000;

            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API Request Failed');

                    const data = await response.json();
                    const fact = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (fact) {
                        showToast(`🤖 AI 老師說：${fact}`, 'success');
                        return;
                    }
                } catch (error) {
                    retries++;
                    if (retries >= maxRetries) {
                        showToast(`哎呀，AI 老師現在有點忙，稍後再問問他關於 ${animalName} 的事吧！`, 'error');
                        return;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2; // Exponential backoff
                }
            }
        }

        // 網頁載入後立即啟動遊戲
        window.onload = initGame;
    </script>
</body>
</html>
